openapi: 3.0.0
info:
  title: API - Gerenciador de Torneios de Vôlei
  description: Documentação da API REST construída com NestJS e Prisma para gerenciamento de campeonatos, times, jogadores e placar ao vivo de voleibol. 
  version: 1.0.0
servers:
  - url: http://localhost:5173
tags:
  - name: Auth
    description: Autenticação de Usuários e Controle de Acesso
  - name: Tournaments
    description: Gerenciamento de Torneios
  - name: Teams
    description: Gerenciamento de Times
  - name: Matches
    description: Gerenciamento de Partidas e Placar ao Vivo
paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: Cadastrar um novo usuário/administrador (Público)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        '201':
          description: Usuário criado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'

  /auth/login:
    post:
      tags:
        - Auth
      summary: Autenticar um usuário e obter o token JWT (Público)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: Autenticação bem-sucedida. Retorna o token de acesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: Token JWT gerado pelo backend para ser usado nas requisições protegidas.

  /tournaments:
    get:
      tags:
        - Tournaments
      summary: Listar todos os torneios (Público)
      responses:
        '200':
          description: Lista de torneios retornada com sucesso.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Torneio'
    post:
      tags:
        - Tournaments
      summary: Criar um novo torneio (Protegido)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TorneioInput'
      responses:
        '201':
          description: Torneio criado com sucesso.
        '401':
          description: Não autorizado. Token JWT ausente ou inválido.
  
  /tournaments/{id}:
    get:
      tags:
        - Tournaments
      summary: Buscar detalhes de um torneio específico (Público)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Detalhes do torneio.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Torneio'
    put:
      tags:
        - Tournaments
      summary: Atualizar um torneio (Protegido)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TorneioInput'
      responses:
        '200':
          description: Torneio atualizado.
        '401':
          description: Não autorizado.
    delete:
      tags:
        - Tournaments
      summary: Remover um torneio (Protegido)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Torneio removido.
        '401':
          description: Não autorizado.

  /teams:
    get:
      tags:
        - Teams
      summary: Listar todos os times (Público)
      responses:
        '200':
          description: Lista de times.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Time'
    post:
      tags:
        - Teams
      summary: Criar um time (Protegido)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TimeInput'
      responses:
        '201':
          description: Time criado.
        '401':
          description: Não autorizado.

  /teams/{id}:
    delete:
      tags:
        - Teams
      summary: Remover um time (Protegido)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Time removido.
        '401':
          description: Não autorizado.

  /matches/{id}:
    get:
      tags:
        - Matches
      summary: Buscar detalhes de uma partida (Público)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Detalhes da partida atual.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Partida'
    delete:
      tags:
        - Matches
      summary: Excluir uma partida (Protegido)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Partida excluída com sucesso.
        '401':
          description: Não autorizado.

  /matches/{id}/players:
    get:
      tags:
        - Matches
      summary: Listar os jogadores de ambos os times de uma partida (Público)
      description: Rota utilizada para alimentar o modal de atribuição de pontos/erros no placar ao vivo.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista de jogadores em quadra/elenco.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Jogador'

  /matches/{id}/events:
    get:
      tags:
        - Matches
      summary: Listar o histórico de eventos de uma partida (Público)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Eventos da partida (pontos, erros, substituições).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventoPartida'
    post:
      tags:
        - Matches
      summary: Registrar um novo evento (ponto, erro ou cartão) (Protegido)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventoPartidaInput'
      responses:
        '201':
          description: Evento registrado e placar recalculado.
        '401':
          description: Não autorizado.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterInput:
      type: object
      required:
        - nome
        - email
        - senha
      properties:
        nome:
          type: string
        email:
          type: string
          format: email
        senha:
          type: string
          format: password

    LoginInput:
      type: object
      required:
        - email
        - senha
      properties:
        email:
          type: string
          format: email
        senha:
          type: string
          format: password

    Usuario:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nome:
          type: string
        email:
          type: string

    Torneio:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nome:
          type: string
        descricao:
          type: string
        dataInicio:
          type: string
          format: date-time
        dataFim:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/StatusTorneio'
          
    TorneioInput:
      type: object
      required:
        - nome
      properties:
        nome:
          type: string
        descricao:
          type: string
        dataInicio:
          type: string
          format: date-time
        dataFim:
          type: string
          format: date-time

    Time:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nome:
          type: string
        quantidadeJogadores:
          type: integer

    TimeInput:
      type: object
      required:
        - nome
      properties:
        nome:
          type: string

    Jogador:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nome:
          type: string
        numero:
          type: integer
        timeId:
          type: string
          format: uuid

    Partida:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nomeTimeCasa:
          type: string
        nomeTimeVisitante:
          type: string
        setsCasa:
          type: integer
        setsVisitante:
          type: integer
        setAtualCasa:
          type: integer
        setAtualVisitante:
          type: integer
        status:
          $ref: '#/components/schemas/StatusPartida'

    EventoPartida:
      type: object
      properties:
        id:
          type: string
          format: uuid
        partidaId:
          type: string
          format: uuid
        indiceSet:
          type: integer
        lado:
          $ref: '#/components/schemas/LadoPonto'
        tipo:
          $ref: '#/components/schemas/TipoPonto'
        tipoErro:
          $ref: '#/components/schemas/TipoErro'
        tipoCartao:
          $ref: '#/components/schemas/TipoCartao'
        jogadorId:
          type: string
          format: uuid
        placarCasa:
          type: integer
        placarVisitante:
          type: integer

    EventoPartidaInput:
      type: object
      required:
        - indiceSet
        - lado
        - tipo
        - placarCasa
        - placarVisitante
      properties:
        indiceSet:
          type: integer
        lado:
          $ref: '#/components/schemas/LadoPonto'
        tipo:
          $ref: '#/components/schemas/TipoPonto'
        tipoErro:
          $ref: '#/components/schemas/TipoErro'
        tipoCartao:
          $ref: '#/components/schemas/TipoCartao'
        jogadorId:
          type: string
          format: uuid
        placarCasa:
          type: integer
        placarVisitante:
          type: integer

    StatusTorneio:
      type: string
      enum: [RASCUNHO, ABERTO, EM_ANDAMENTO, FINALIZADO]
    
    StatusPartida:
      type: string
      enum: [AGENDADA, AQUECIMENTO, AO_VIVO, FINALIZADA]

    LadoPonto:
      type: string
      enum: [CASA, VISITANTE]

    TipoPonto:
      type: string
      enum: [SAQUE, ATAQUE, BLOQUEIO, ERRO_ADVERSARIO, CARTAO_ADVERSARIO]

    TipoErro:
      type: string
      enum: [ERRO_SAQUE, ERRO_ATAQUE, TOQUE_REDE, DOIS_TOQUES, QUATRO_TOQUES, INVASAO, BOLA_FORA, CONDUCAO, ERRO_ROTACAO]

    TipoCartao:
      type: string
      enum: [AMARELO, VERMELHO]